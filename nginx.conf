# Nginx configuration for Mozartify Frontend (SPA)
# Serves the Vite built application with SPA routing

server {
  listen 5173;
  server_name _;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json;
  gzip_min_length 1000;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # CORS headers (for API calls from browser)
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

  # Root directory
  root /usr/share/nginx/html;

  # SPA fallback: route all requests to index.html except for static assets
  location / {
    try_files $uri $uri/ /index.html;
    
    # Cache control: no cache for index.html
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
  }

  # Static assets with long cache (images, css, js bundles)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}
